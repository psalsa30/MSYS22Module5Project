{% extends "MyInventoryApp/base.html" %}

{% block title %}Add Water Bottle — MyInventorySystem{% endblock %}

{% block content %}
  <h1>Add Water Bottle</h1>

  <form method="post" action="/add_bottle">
    {% csrf_token %}

    <p>
      <label for="name">Bottle Name:</label><br>
      <input type="text" id="name" name="name" required />
    </p>

    <p>
      <label for="capacity">Capacity (mL):</label><br>
      <input type="number" id="capacity" name="capacity" min="1" required />
    </p>

    <p>
      <label for="price">Price:</label><br>
      <input type="number" id="price" name="price" step="0.01" min="0" required />
    </p>

    <p>
      <label for="stock">Stock Quantity:</label><br>
      <input type="number" id="stock" name="stock" min="0" required />
    </p>

    <p>
      <label for="supplier">Supplier:</label><br>
      <select id="supplier" name="supplier">
        <option value="" disabled selected> Select a supplier </option>
        {% for supplier in suppliers %}
          <option value="{{ supplier.id }}">{{ supplier.name }}</option>
        {% empty %}
          <option disabled>No suppliers available</option>
        {% endfor %}
      </select>
    </p>

    <p>
      <button type="submit">Save Bottle</button>
      <a href="/view_bottles">Cancel</a>
    </p>
  </form>
{% endblock %}
